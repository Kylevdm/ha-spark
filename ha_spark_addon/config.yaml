---
name: ha-spark
version: "1.0.0-rc2"
slug: ha_spark_addon
description: Local-first battery charge planner and automation agent for Home Assistant
url: https://github.com/Kylevdm/ha-spark
arch:
  - aarch64
  - amd64
init: true
homeassistant_api: true
startup: services
boot: auto
# HTTP API for the companion integration, reached through HA's authenticated
# ingress proxy (not mapped to the host network). Must match api.server.INGRESS_PORT.
ingress: true
ingress_port: 8099
ports:
  8098/tcp: null
ports_description:
  8098/tcp: ha-spark agent surface (MCP + OpenAPI) — token-protected; leave unmapped unless used
options:
  log_level: INFO
  proactive_mode: simulate
  db_path: /data/ha_spark.db
  ha_timeout: 10.0
  ollama_url: "http://127.0.0.1:11434"
  ollama_model: "qwen3:14b"
  ollama_num_ctx: 32768
  ollama_timeout: 120.0
  ollama_health_timeout: 2.0
  battery_capacity_kwh: 26.88
  battery_voltage_v: 51.0
  min_soc: 20.0
  target_soc_cap: 90.0
  max_charge_current_a: 62.5
  charge_buffer_pct: 20.0
  charge_efficiency: 0.9
  charge_strategy: deficit
  solar_haircut_k: 1.0
  solar_percentile: "50"
  forecast_days: 14
  expected_load_kwh: 24.0
  charge_window_start: "23:30"
  charge_window_end: "05:30"
  rate_offpeak_gbp_kwh: 0.069
  rate_peak_gbp_kwh: 0.30
  rate_export_gbp_kwh: 0.0
  tariff_provider: fixed
  dynamic_rates_entity: ""
  dynamic_rates_entity_tomorrow: ""
  profile_min_days: 7
  profile_history_days: 60
  timezone: Europe/London
  plan_run_time: "22:00"
  octopus_api_url: "https://api.octopus.energy/v1"
  soc_entity: ""
  battery_voltage_entity: ""
  solar_tomorrow_entity: ""
  octopus_rate_entity: ""
  dispatch_entity: ""
  ev_plug_entity: ""
  ev_status_entity: ""
  consumption_energy_entity: ""
  supply_max_current_a: 75.0
  supply_voltage_v: 240.0
  charge_current_entity: ""
  inverter_power_switch_entity: ""
  ha_template_charge_needed_entity: ""
  inverter: solis
  charge_window_start_entity: ""
  charge_window_end_entity: ""
  alphaess_serial: ""
  devices: []
  outdoor_weather_entity: weather.home
  load_model: auto
  buffer_mode: fixed
  away_load_factor: 0.4
  guests_load_factor: 1.3
  agent_surface: off
  agent_exposure: read_act
  agent_expose_port: false
schema:
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  proactive_mode: list(off|simulate|on)
  db_path: str
  ha_timeout: float
  ollama_url: url
  ollama_model: str
  ollama_num_ctx: int
  ollama_timeout: float
  ollama_health_timeout: float
  battery_capacity_kwh: float
  battery_voltage_v: float
  min_soc: float(0,100)
  target_soc_cap: float(0,100)
  max_charge_current_a: float
  charge_buffer_pct: float
  charge_efficiency: float(0,1)
  charge_strategy: list(deficit|fill)
  solar_haircut_k: float
  solar_percentile: list(10|50|90)
  forecast_days: int(1,)
  expected_load_kwh: float
  charge_window_start: match(^\d{2}:\d{2}$)
  charge_window_end: match(^\d{2}:\d{2}$)
  rate_offpeak_gbp_kwh: float
  rate_peak_gbp_kwh: float
  rate_export_gbp_kwh: float
  tariff_provider: list(fixed|dynamic|octopus_intelligent)
  dynamic_rates_entity: str
  dynamic_rates_entity_tomorrow: str
  profile_min_days: int
  profile_history_days: int
  timezone: str
  plan_run_time: match(^\d{2}:\d{2}$)
  backfill_source_entity: str?
  octopus_api_key: password?
  octopus_mpan: str?
  octopus_meter_serial: str?
  octopus_api_url: url
  octopus_account_number: str?
  octopus_product_code: str?
  octopus_tariff_code: str?
  soc_entity: str?
  battery_voltage_entity: str?
  solar_tomorrow_entity: str?
  octopus_rate_entity: str?
  dispatch_entity: str?
  ev_plug_entity: str?
  ev_status_entity: str?
  consumption_energy_entity: str?
  grid_power_entity: str?
  supply_max_current_a: float
  supply_voltage_v: float
  charge_current_entity: str?
  inverter_power_switch_entity: str?
  ha_template_charge_needed_entity: str?
  inverter: list(solis|alphaess)
  charge_window_start_entity: str?
  charge_window_end_entity: str?
  alphaess_serial: str?
  devices:
    - id: str
      type: list(inverter)
      driver: list(solis|alphaess)
      control: list(observe|ha_spark|supplier)?
      entities:
        charge_current: str?
        window_start: str?
        window_end: str?
        power_switch: str?
  person_entities: str?
  heatpump_energy_entity: str?
  outdoor_weather_entity: str?
  load_model: list(median|ml|auto)
  buffer_mode: list(fixed|quantile)
  latitude: float?
  longitude: float?
  away_load_factor: float(0,)
  guests_load_factor: float(0,)
  agent_surface: list(off|on)
  agent_exposure: list(read|read_act|read_write)
  agent_api_token: password?
  agent_expose_port: bool
